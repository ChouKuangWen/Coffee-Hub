server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------
    # 1. API 路由轉發 (修正 401 錯誤的關鍵)
    # -----------------------------------------------
    # 匹配所有 API 前綴：/auth/, /users/, /orders/, /products/, /order_items/
    location ~ ^/(auth|users|orders|products|order_items)/ {
        # 轉發到後端服務的 Docker Compose 服務名稱和埠號
        proxy_pass http://backend:8080;

        # 確保 Host 頭部正確
        # 確保所有請求 Header，特別是 Authorization 和 Cookie，被傳遞
        # 這是解決 401 錯誤的關鍵指令
        proxy_pass_request_headers on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # -----------------------------------------------
    # 2. 前端網頁路由處理 (修正 404 錯誤的關鍵)
    # -----------------------------------------------
    # 所有不匹配 API 路由的請求（包括 /login, /home, /），都導向 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}