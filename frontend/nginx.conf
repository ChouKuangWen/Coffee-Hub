server {
    listen 8080;

    # 前端靜態檔案位置
    root /usr/share/nginx/html;

    # 預設首頁
    index index.html;

    # 靜態檔案路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip 選配（可加速）
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/octet-stream;
    gzip_min_length 256;
}
