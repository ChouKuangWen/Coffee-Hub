services:
  # --------------------
  # 前端 Vue 開發模式
  # --------------------
  frontend:
    build: ./frontend        # 前端 Dockerfile 路徑
    ports:
      - "3000:80" 
    depends_on:
      - backend
    networks:
      - member-net

  # --------------------
  # 後端 FastAPI
  # --------------------
  backend:
    build: ./backend         # 後端 Dockerfile 路徑
    ports:
      - "8080:8080"          # 本地 8080 對應容器內 8080 (FastAPI uvicorn)
    env_file:
      - .env                  # 從 .env 讀取環境變數
    depends_on:
      - mysql
    networks:
      - member-net

  # --------------------
  # MySQL 資料庫 (官方 image)
  # --------------------
  mysql:
    image: mysql:8
    restart: always
    env_file:
      - .env       # 從 .env 讀取 MySQL root 密碼、資料庫名稱
    volumes:
      # 將初始化 SQL 檔案掛載進去
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      # 掛載測試資料檔案
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - mysql-data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - member-net

# --------------------
# Volume
# --------------------
volumes:
  mysql-data:

# --------------------
# Network
# --------------------
networks:
  member-net:
    driver: bridge